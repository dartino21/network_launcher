name: Test and release Windows build

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements.txt pytest
      - run: python -m pytest

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify tag matches package version
        shell: pwsh
        run: |
          $version = python -c "import sys; sys.path.insert(0, 'src'); import network_launcher; print(network_launcher.__version__)"
          if ("v$version" -ne "${{ github.ref_name }}") {
            throw "Tag ${{ github.ref_name }} does not match package version v$version"
          }
      - run: powershell -ExecutionPolicy Bypass -File scripts\build_windows.ps1
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/NetworkLauncher-v*-windows-x64.zip
